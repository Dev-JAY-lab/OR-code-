<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium QR Code Generator. Create, customize, download, and share beautiful QR codes instantly.">
    <meta name="keywords" content="QR Code Generator, Custom QR Code, Premium QR, Download QR Code, Share QR Code">
    <title>ProQR - The Ultimate 3D QR Generator</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Libraries -->
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
</head>
<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="main-layout">
        <!-- Hero Section with 3D elements -->
        <aside class="hero-section">
            <div class="hero-content">
                <div class="logo">
                    <i class="fa-solid fa-qrcode"></i>
                    <h1>Pro<span>QR</span></h1>
                </div>
                <h2 class="hero-tagline">Welcome to the future of <br><span class="gradient-text">QR Generation</span></h2>
                <p class="subtitle">Customizable. Super-fast. 100% Free.</p>
                
                <div class="image-wrapper" data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-perspective="1000" data-tilt-glare data-tilt-max-glare="0.3">
                    <img src="3d-tech.png" alt="3D Holographic Tech" class="hero-3d-image">
                </div>
            </div>
        </aside>

        <!-- Application Core -->
        <main class="app-wrapper">
            <div class="app-container slide-in-right">
                
                <!-- Left Panel: Controls -->
                <section class="controls-panel">
                    <div class="panel-header">
                        <div class="header-left">
                            <h3>Configuration</h3>
                            <button id="btn-history" class="btn-icon" title="View History"><i class="fa-solid fa-clock-rotate-left"></i></button>
                        </div>
                        <div class="pulse-indicator"></div>
                    </div>
                    
                    <div class="input-group stagger-item">
                        <label for="qr-data"><i class="fa-solid fa-link"></i> Link or Data</label>
                        <textarea id="qr-data" placeholder="Enter URL, text, or any data here..." rows="2">https://example.com</textarea>
                    </div>

                    <div class="customization-section stagger-item">
                        <h3><i class="fa-solid fa-palette"></i> Style Your Code</h3>
                        
                        <div class="color-controls">
                            <div class="input-group">
                                <label for="color-dark">QR Color</label>
                                <div class="color-picker-wrapper">
                                    <input type="color" id="color-dark" value="#ffffff">
                                    <span class="color-value" id="color-dark-val">#ffffff</span>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="color-light">Background</label>
                                <div class="color-picker-wrapper">
                                    <input type="color" id="color-light" value="#000000">
                                    <span class="color-value" id="color-light-val">#000000</span>
                                </div>
                            </div>
                        </div>

                        <div class="style-controls">
                            <div class="input-group">
                                <label for="dot-style">Pattern</label>
                                <select id="dot-style">
                                    <option value="square">Square</option>
                                    <option value="dots" selected>Dots</option>
                                    <option value="rounded">Rounded</option>
                                    <option value="extra-rounded">Extra Rounded</option>
                                    <option value="classy">Classy</option>
                                    <option value="classy-rounded">Classy Rounded</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label for="corner-style">Corners</label>
                                <select id="corner-style">
                                    <option value="square">Square</option>
                                    <option value="dot">Dot</option>
                                    <option value="extra-rounded" selected>Extra Rounded</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Right Panel: Preview & Actions -->
                <section class="preview-panel stagger-item">
                    <!-- Added Tilt to the QR preview -->
                    <div class="qr-preview-container" data-tilt data-tilt-max="10" data-tilt-speed="400" data-tilt-perspective="500">
                        <div id="qr-canvas"></div>
                        <div class="scanning-line"></div>
                        <div class="glass-reflection"></div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn btn-primary" id="btn-download" title="Download High-Res PNG">
                            <i class="fa-solid fa-cloud-arrow-down"></i> Download PNG
                        </button>
                        <button class="btn btn-secondary" id="btn-share" title="Share with friends">
                            <i class="fa-solid fa-paper-plane"></i> Share
                        </button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- History Modal -->
    <div class="modal-overlay" id="history-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Generation History</h3>
                <button class="close-modal" id="close-history"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <ul id="history-list" class="history-list">
                    <!-- History items injected via JS -->
                </ul>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary btn-small" id="btn-clear-history">Clear History</button>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <p>Designed with <i class="fa-solid fa-heart"></i> by <strong>JAY</strong></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
